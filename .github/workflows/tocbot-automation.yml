name: TocBot Automation

on:
  pull_request:
    types: [review_requested]

jobs:
  tocbot-automation:
    if: |
      (github.event.requested_reviewer && github.event.requested_reviewer.login == 'ToCbot') ||
      (github.event.requested_reviewers && contains(github.event.requested_reviewers.*.login, 'ToCbot'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bugbot via TocBot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TOC_BOT_PAT }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // If TocBot already authored the PR, just comment and remove reviewer
            if (pr.user.login === 'ToCbot') {
              await github.rest.issues.createComment({
                issue_number: pr.number, owner, repo,
                body: 'bugbot run'
              });
              await github.rest.pulls.removeRequestedReviewers({
                owner, repo, pull_number: pr.number,
                reviewers: ['ToCbot']
              });
              return;
            }

            // Bugbot only acts when TocBot is the PR author, so we recreate
            // the PR under TocBot's identity and link back to the original.

            // Gather metadata to copy over
            const labels = pr.labels.map(l => l.name);
            const assignees = pr.assignees.map(a => a.login);

            // Close original PR first — GitHub only allows one open PR per branch
            await github.rest.issues.createComment({
              issue_number: pr.number, owner, repo,
              body: '🔄 Closing to recreate as TocBot for automated code review. A new PR will be linked shortly.'
            });
            await github.rest.pulls.update({
              owner, repo, pull_number: pr.number, state: 'closed'
            });

            // Create new PR as TocBot (TOC_BOT_PAT makes TocBot the author)
            const { data: newPr } = await github.rest.pulls.create({
              owner, repo,
              title: pr.title,
              body: [
                pr.body || '',
                '',
                '---',
                `_Recreated from #${pr.number} to enable automated code review._`
              ].join('\n'),
              head: pr.head.ref,
              base: pr.base.ref,
            });

            core.info(`Created new PR #${newPr.number}`);

            // Update the closing comment on the original PR with a link
            await github.rest.issues.createComment({
              issue_number: pr.number, owner, repo,
              body: `➡️ Recreated as #${newPr.number}`
            });

            // Copy labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: newPr.number, labels
              });
            }

            // Copy assignees
            if (assignees.length > 0) {
              await github.rest.issues.addAssignees({
                owner, repo, issue_number: newPr.number, assignees
              });
            }

            // Trigger bugbot on the new PR
            await github.rest.issues.createComment({
              issue_number: newPr.number, owner, repo,
              body: 'bugbot run'
            });
